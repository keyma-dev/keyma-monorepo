# TinkerGraph config for integration tests: accept arbitrary (string) ids so
# Keyma's id-as-T.id mapping works. Mount over the gremlin-server image's
# conf/tinkergraph-empty.properties. See README.md.
gremlin.graph=org.apache.tinkerpop.gremlin.tinkergraph.structure.TinkerGraph
gremlin.tinkergraph.vertexIdManager=ANY
gremlin.tinkergraph.edgeIdManager=ANY
gremlin.tinkergraph.vertexPropertyIdManager=ANY
