[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "keyma-runtime"
dynamic = ["version"]
description = "Python target runtime for Keyma — the codec (JSON + binary serialization) and the RPC stack (ServiceHost, capability-flagged Transport, direct transport, service client), authored + tested in isolation then baked into self-contained generated Python bundles by the Keyma Python backend."
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE" }
authors = [{ name = "Keyma contributors" }]
keywords = ["keyma", "codegen", "serialization", "rpc", "cross-language"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "build>=1.0"]

[project.urls]
Homepage = "https://github.com/keyma-dev/keyma-monorepo"
Repository = "https://github.com/keyma-dev/keyma-monorepo/tree/main/packages/runtime-python"

[tool.hatch.version]
path = "src/keyma/runtime/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/keyma"]

[tool.hatch.build.targets.sdist]
include = ["/src", "/tests", "/README.md", "/LICENSE", "/pyproject.toml"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
